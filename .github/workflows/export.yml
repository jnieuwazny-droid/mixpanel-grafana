name: Export Mixpanel

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python mixpanel_export.py
        env:
          MIXPANEL_USER: ${{ secrets.MIXPANEL_USER }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add active_users.json
          git commit -m "Update metrics" || exit 0
          git push
