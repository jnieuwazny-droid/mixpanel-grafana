name: Sync Mixpanel Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests mysql-connector-python

    - name: Run script
      run: python mixpanel_export.py # I can see on your left sidebar this is your exact file name!
      env:
        MIXPANEL_USER: ${{ secrets.MIXPANEL_USER }}
        MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
